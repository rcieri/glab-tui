version: 2

updates:
  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 10
    groups:
      # Group all patch/minor updates into a single PR
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
    labels:
      - "chore"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "ci/cd"
    commit-message:
      prefix: "ci(deps)"
