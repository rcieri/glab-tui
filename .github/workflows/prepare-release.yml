name: Prepare Release

on:
    workflow_dispatch:
        inputs:
            version_increment:
                description: "Select version bump type"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write
    pull-requests: write

jobs:
    prepare-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Configure Git
              run: |
                  git config --global user.name "opencode[bot]"
                  git config --global user.email "opencode[bot]@users.noreply.github.com"

            - name: Determine Next Version Tag
              id: versioning
              run: |
                  LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
                  VERSION=${LATEST_TAG#v}
                  IFS='.' read -r major minor patch <<< "$VERSION"

                  if [ "${{ github.event.inputs.version_increment }}" = "major" ]; then
                      major=$((major + 1))
                      minor=0
                      patch=0
                  elif [ "${{ github.event.inputs.version_increment }}" = "minor" ]; then
                      minor=$((minor + 1))
                      patch=0
                  else
                      patch=$((patch + 1))
                  fi

                  NEW_TAG="v$major.$minor.$patch"
                  echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
                  echo "Calculated new version: $NEW_TAG"

            - name: OpenCode Docs & Changelog Update
              uses: anomalyco/opencode/github@latest
              env:
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NEW_TAG: ${{ env.NEW_TAG }}
              with:
                  model: opencode/big-pickle
                  use_github_token: true
                  prompt: |
                      We are prepping a new repository release. The upcoming version tag is going to be: $NEW_TAG.

                      Your task is to analyze the git commits, merged pull requests, and codebase changes since the last version tag, and update the following three files directly in the workspace:

                      1. CHANGELOG.md: Prepend a beautifully structured, developer-friendly update section for version $NEW_TAG at the top of the file, cleanly breaking down Features, Bug Fixes, and Maintenance.
                      2. AGENTS.md: Update any agent guidelines, automation logs, or architecture schemas affected by our latest feature set or dependencies. Ensure versioning matrices match $NEW_TAG.
                      3. README.md: Scan for installation commands, setup instructions, or documentation badges displaying the old version string, and replace them cleanly with version $NEW_TAG.

                      Save and write these file modifications directly back into the working directory. OpenCode will commit these changes and open a pull request.

            - name: Standardize Pull Request Title
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Give GitHub a brief second to register the newly created PR from the previous step
                  sleep 3

                  # Find the open PR created by OpenCode for this branch
                  PR_NUMBER=$(gh pr list --head "release-prep-${{ env.NEW_TAG }}" --json number --jq '.[0].number')

                  # If OpenCode used a default branch format like 'opencode-branch...', catch any open PR from the bot account
                  if [ -z "$PR_NUMBER" ]; then
                      PR_NUMBER=$(gh pr list --author "app/opencode" --json number --jq '.[0].number' 2>/dev/null || gh pr list --json number --jq '.[0].number')
                  fi

                  if [ -n "$PR_NUMBER" ]; then
                      echo "Found PR #$PR_NUMBER. Overriding title to match conventional commits formatting..."
                      gh pr edit "$PR_NUMBER" --title "chore: prepare release ${{ env.NEW_TAG }}"
                  else
                      echo "Could not find an active PR number to rename."
                  fi
