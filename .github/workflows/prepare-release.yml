name: Prepare Release

on:
    workflow_dispatch:
        inputs:
            version_increment:
                description: "Select version bump type"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write
    pull-requests: write

jobs:
    prepare-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Configure Git
              run: |
                  git config --global user.name "opencode-release[bot]"
                  git config --global user.email "opencode-release[bot]@users.noreply.github.com"

            - name: Determine Next Version Tag
              id: versioning
              run: |
                  LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
                  VERSION=${LATEST_TAG#v}
                  IFS='.' read -r major minor patch <<< "$VERSION"

                  if [ "${{ github.event.inputs.version_increment }}" = "major" ]; then
                      major=$((major + 1))
                      minor=0
                      patch=0
                  elif [ "${{ github.event.inputs.version_increment }}" = "minor" ]; then
                      minor=$((minor + 1))
                      patch=0
                  else
                      patch=$((patch + 1))
                  fi

                  NEW_TAG="v$major.$minor.$patch"
                  echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
                  echo "Calculated new version: $NEW_TAG"

            - name: OpenCode Docs & Changelog Update
              uses: anomalyco/opencode/github@latest
              env:
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NEW_TAG: ${{ env.NEW_TAG }}
              with:
                  model: opencode/big-pickle
                  use_github_token: true
                  prompt: |
                      We are prepping a new repository release. The upcoming version tag is going to be: $NEW_TAG.

                      Your task is to analyze the git commits, merged pull requests, and codebase changes since the last version tag, and update the following three files directly in the workspace:

                      1. CHANGELOG.md: Prepend a beautifully structured, developer-friendly update section for version $NEW_TAG at the top of the file, cleanly breaking down Features, Bug Fixes, and Maintenance.
                      2. AGENTS.md: Update any agent guidelines, automation logs, or architecture schemas affected by our latest feature set or dependencies. Ensure versioning matrices match $NEW_TAG.
                      3. README.md: Scan for installation commands, setup instructions, or documentation badges displaying the old version string, and replace them cleanly with version $NEW_TAG.

                      Save and write these file modifications directly back into the working directory.

            - name: Update package manifests
              run: bash scripts/update-manifests.sh ${{ env.NEW_TAG }}

            - name: Commit manifest updates and push to release branch
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  sleep 3
                  PR_NUMBER=$(gh pr list --state open --json number,headRefName,headRepository \
                    --jq '.[] | select(.headRefName | contains("opencode-release") or startswith("opencode/")) | .number' | head -n 1)
                  if [ -z "$PR_NUMBER" ]; then
                      echo "No PR found; changes remain local."
                      exit 0
                  fi
                  BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
                  git add Formula/ scoop/
                  git diff --cached --quiet && echo "No manifest changes" && exit 0
                  git commit -m "chore: bump package manifests to ${{ env.NEW_TAG }}"
                  git push origin "$BRANCH"

            - name: Standardize Pull Request Title
              if: always()
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Give GitHub API a brief moment to process OpenCode's PR submission
                  sleep 5

                  echo "Scanning for active PRs generated by opencode-release branches..."

                  # Target PRs matching opencode-release branch layout prefixes
                  PR_NUMBER=$(gh pr list --state open --json number,headRefName --jq '.[] | select(.headRefName | contains("opencode-release") or startswith("opencode/")) | .number' | head -n 1)

                  # Fallback: Check for PRs created by the user/bot token if it falls back to bot context
                  if [ -z "$PR_NUMBER" ]; then
                      PR_NUMBER=$(gh pr list --state open --json number,author --jq '.[] | select(.author.login | contains("opencode")) | .number' | head -n 1)
                  fi

                  if [ -n "$PR_NUMBER" ]; then
                      echo "Found release preparation PR #$PR_NUMBER. Synchronizing title format..."
                      gh pr edit "$PR_NUMBER" --title "chore: prepare release ${{ env.NEW_TAG }}"
                  else
                      echo "Warning: No matching open PR discovered to automatically rename."
                  fi
