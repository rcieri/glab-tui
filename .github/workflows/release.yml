name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-amd64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-amd64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: glab-tui.exe
            asset_name: glab-tui-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target\${{ matrix.target }}\release\${{ matrix.artifact_name }} `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Generate checksums
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    name: Docker
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  update-manifests:
    name: Update package manifests
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula and Scoop manifest
        run: bash scripts/update-manifests.sh ${{ github.ref_name }}

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="bot/update-manifests-${{ github.ref_name }}"
          git config user.name "glab-tui-bot"
          git config user.email "bot@glab-tui"
          git checkout -b "$BRANCH"
          git add Formula/ scoop/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump package manifests to ${{ github.ref_name }}"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump package manifests to ${{ github.ref_name }}" \
            --body "Automated update of Homebrew formula and Scoop manifest after release ${{ github.ref_name }}." \
            --label automated
