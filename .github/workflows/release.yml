name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-amd64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-amd64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: glab-tui.exe
            asset_name: glab-tui-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target\${{ matrix.target }}\release\${{ matrix.artifact_name }} `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Generate checksums
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    name: Docker
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker tags
        id: docker_tags
        run: |
          TAGS="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          if ! echo "${{ github.ref_name }}" | grep -q '-'; then
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}


  publish-crate:
      name: Publish to crates.io
      runs-on: ubuntu-latest
      needs: build-and-release
      steps:
        - uses: actions/checkout@v7

        - name: Install stable toolchain
          uses: dtolnay/rust-toolchain@stable

        - name: Verify version matches tag
          run: |
            PACKAGE_VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "Package version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
              exit 1
            fi

        - name: Publish to crates.io
          run: cargo publish --locked
          env:
              CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  trigger-homebrew:
    name: Trigger Homebrew formula update
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Run homebrew update workflow
        run: gh workflow run update-formula.yml --repo rcieri/homebrew-glab-tui
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_PAT }}

  trigger-scoop:
    name: Trigger Scoop manifest update
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Run scoop excavator workflow
        run: gh workflow run excavator.yml --repo rcieri/scoop-glab-tui
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_PAT }}

  generate-release-notes:
    name: Generate release notes via OpenCode
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: echo "tag=$(git describe --tags --abbrev=0 HEAD^)" >> "$GITHUB_OUTPUT"

      - name: Generate notes via OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode-go/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Read CHANGELOG.md and extract the section for version ${{ github.ref_name }}.

            Also read the existing release notes for the previous tag ${{ steps.prev.outputs.tag }} (use \`gh release view ${{ steps.prev.outputs.tag }} --json body --jq .body\`) to match their formatting style.

            Write RELEASE_NOTES.md matching the same format:
            - Title "## What's Changed"
            - Sections: ### Added / ### Fixed / ### Changed / ### Dependencies
            - Entries start with bolded headline: \`- **Name** — Description with references (#123).\`
            - End with: \`**Full Changelog**: https://github.com/rcieri/glab-tui/compare/${{ steps.prev.outputs.tag }}...${{ github.ref_name }}\`

            Use the content from CHANGELOG.md for the current version as the source material.

      - name: Update release body
        run: gh release edit ${{ github.ref_name }} --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

