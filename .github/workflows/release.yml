name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-amd64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-amd64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: glab-tui.exe
            asset_name: glab-tui-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target\${{ matrix.target }}\release\${{ matrix.artifact_name }} `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Generate checksums
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
