name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-amd64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: glab-tui
            asset_name: glab-tui-linux-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-amd64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: glab-tui
            asset_name: glab-tui-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: glab-tui.exe
            asset_name: glab-tui-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target\${{ matrix.target }}\release\${{ matrix.artifact_name }} `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Generate checksums
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    name: Docker
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker tags
        id: docker_tags
        run: |
          TAGS="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          if ! echo "${{ github.ref_name }}" | grep -q '-'; then
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}

  publish-crate:
      name: Publish to crates.io
      runs-on: ubuntu-latest
      needs: build-and-release
      steps:
        - uses: actions/checkout@v7

        - name: Install stable toolchain
          uses: dtolnay/rust-toolchain@stable

        - name: Verify version matches tag
          run: |
            PACKAGE_VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
            TAG_VERSION=$(echo "$GITHUB_REF_NAME" | sed 's/^v\.\?//')
            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "Package version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
              exit 1
            fi

        - name: Publish to crates.io
          run: cargo publish --locked
          env:
              CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  trigger-post-release:
    name: Trigger post-release tasks
    runs-on: ubuntu-latest
    needs: [publish-crate, docker-push]
    steps:
      - name: Kick off post-release workflow
        run: gh workflow run post-release.yml --repo rcieri/glab-tui -f tag=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
