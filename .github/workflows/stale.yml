name: Stale Issues

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had any activity in the last 60 days. It will be closed in
            14 days unless it receives a comment or the `stale` label is removed.
          close-issue-message: >
            This issue was closed automatically after 14 days of inactivity
            since being marked as stale. Feel free to reopen it if it is
            still relevant.

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had any activity in the last 30 days. It will be closed
            in 7 days unless new commits are pushed or a comment is added.
          close-pr-message: >
            This pull request was closed automatically after 7 days of inactivity
            since being marked as stale. Feel free to reopen it when you are ready
            to continue.

          # Never mark these as stale
          exempt-issue-labels: "feature,bug,pinned"
          exempt-pr-labels: "pinned"

          repo-token: ${{ secrets.GITHUB_TOKEN }}
